name: fit_and_well
description: FitAI Coach - AI-powered Health & Fitness Coach Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Backend - Supabase
  supabase_flutter: ^2.5.6

  # HTTP & Networking
  http: ^1.2.1
  connectivity_plus: ^6.0.3
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  flutter_staggered_grid_view: ^0.7.0
  expandable: ^5.0.1

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Image Handling
  image_picker: ^1.1.2
  image_cropper: ^7.0.3

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Google Sign In
  google_sign_in: ^6.2.1

  # Sign In with Apple
  sign_in_with_apple: ^6.1.0

  # OpenAI
  dart_openai: ^4.1.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  logger: ^2.4.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # Animations
  flutter_animate: ^4.5.0

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # Stripe
  flutter_stripe: ^10.2.0

  # Charts
  syncfusion_flutter_charts: ^33.2.15

  # Cupertino Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mockito: ^5.4.4
#  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
